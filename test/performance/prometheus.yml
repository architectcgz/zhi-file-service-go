global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: upload-service
    metrics_path: /metrics
    static_configs:
      - targets:
          - 127.0.0.1:8080
  - job_name: access-service
    metrics_path: /metrics
    static_configs:
      - targets:
          - 127.0.0.1:8081
