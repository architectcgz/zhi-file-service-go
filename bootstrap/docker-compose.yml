version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: zhi-file-postgres
    environment:
      POSTGRES_USER: zhi
      POSTGRES_PASSWORD: zhi
      POSTGRES_DB: zhi_file_service
    ports:
      - '5432:5432'
    volumes:
      - zhi-file-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zhi -d zhi_file_service"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: zhi-file-redis
    ports:
      - '6379:6379'
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: zhi-file-minio
    command: server /data --console-address ':9001'
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - zhi-file-minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  zhi-file-postgres-data:
  zhi-file-minio-data:
