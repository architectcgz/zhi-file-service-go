apiVersion: v1
kind: Service
metadata:
  name: admin-service
  labels:
    app.kubernetes.io/name: admin-service
    app.kubernetes.io/part-of: zhi-file-service-go
    app.kubernetes.io/component: control-plane
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: admin-service
  ports:
    - name: http
      port: 8080
      targetPort: http
      protocol: TCP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: admin-service
  labels:
    app.kubernetes.io/name: admin-service
    app.kubernetes.io/part-of: zhi-file-service-go
    app.kubernetes.io/component: control-plane
spec:
  replicas: 2
  revisionHistoryLimit: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: admin-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: admin-service
        app.kubernetes.io/part-of: zhi-file-service-go
        app.kubernetes.io/component: control-plane
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: admin-service
          image: ghcr.io/architectcgz/zhi-file-service-go/admin-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: APP_ENV
              value: "prod"
            - name: HTTP_PORT
              value: "8080"
            - name: METRICS_ENABLED
              value: "true"
            - name: ADMIN_DELETE_REQUIRES_REASON
              value: "true"
            - name: ADMIN_LIST_DEFAULT_LIMIT
              value: "50"
            - name: ADMIN_LIST_MAX_LIMIT
              value: "200"
          envFrom:
            - secretRef:
                name: zhi-file-service-shared-secrets
          startupProbe:
            httpGet:
              path: /ready
              port: http
            periodSeconds: 5
            failureThreshold: 20
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /live
              port: http
            periodSeconds: 10
            failureThreshold: 3
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 512Mi
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: admin-service
  labels:
    app.kubernetes.io/name: admin-service
    app.kubernetes.io/part-of: zhi-file-service-go
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: admin-service
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: admin-service
  labels:
    app.kubernetes.io/name: admin-service
    app.kubernetes.io/part-of: zhi-file-service-go
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: admin-service
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80

