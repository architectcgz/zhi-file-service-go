nameOverride: ""
fullnameOverride: ""
component: control-plane
replicaCount: 2

image:
  repository: ghcr.io/architectcgz/zhi-file-service-go/admin-service
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8080

env:
  APP_ENV: prod
  HTTP_PORT: "8080"
  METRICS_ENABLED: "true"
  ADMIN_DELETE_REQUIRES_REASON: "true"
  ADMIN_LIST_DEFAULT_LIMIT: "50"
  ADMIN_LIST_MAX_LIMIT: "200"

secretRefs:
  - zhi-file-service-shared-secrets

probes:
  startup:
    path: /ready
    periodSeconds: 5
    failureThreshold: 20
  readiness:
    path: /ready
    periodSeconds: 10
    failureThreshold: 3
  liveness:
    path: /live
    periodSeconds: 10
    failureThreshold: 3

resources:
  requests:
    cpu: 200m
    memory: 256Mi
  limits:
    cpu: 1000m
    memory: 512Mi

pdb:
  enabled: true
  minAvailable: 1

hpa:
  enabled: true
  minReplicas: 2
  maxReplicas: 6
  cpuUtilization: 70
  memoryUtilization: 80

