nameOverride: ""
fullnameOverride: ""
component: data-plane
replicaCount: 2

image:
  repository: ghcr.io/architectcgz/zhi-file-service-go/access-service
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8080

env:
  APP_ENV: prod
  HTTP_PORT: "8080"
  METRICS_ENABLED: "true"
  ACCESS_PUBLIC_URL_ENABLED: "true"
  ACCESS_TICKET_TTL: 5m
  ACCESS_DOWNLOAD_REDIRECT_TTL: 2m
  ACCESS_PRIVATE_PRESIGN_TTL: 2m

secretRefs:
  # secret 应至少提供 ACCESS_TICKET_SIGNING_KEY、ACCESS_AUTH_JWKS；如需 issuer 白名单，可同时提供 ACCESS_AUTH_ALLOWED_ISSUERS
  - zhi-file-service-shared-secrets

probes:
  startup:
    path: /ready
    periodSeconds: 5
    failureThreshold: 20
  readiness:
    path: /ready
    periodSeconds: 10
    failureThreshold: 3
  liveness:
    path: /live
    periodSeconds: 10
    failureThreshold: 3

resources:
  requests:
    cpu: 250m
    memory: 256Mi
  limits:
    cpu: 1000m
    memory: 512Mi

pdb:
  enabled: true
  minAvailable: 1

hpa:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  cpuUtilization: 70
  memoryUtilization: 80
