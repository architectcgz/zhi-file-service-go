nameOverride: ""
fullnameOverride: ""
component: data-plane
replicaCount: 2

image:
  repository: ghcr.io/architectcgz/zhi-file-service-go/upload-service
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8080

env:
  APP_ENV: prod
  HTTP_PORT: "8080"
  METRICS_ENABLED: "true"
  UPLOAD_MAX_INLINE_SIZE: "10485760"
  UPLOAD_SESSION_TTL: 24h
  UPLOAD_COMPLETE_TIMEOUT: 30s
  UPLOAD_PRESIGN_TTL: 15m
  UPLOAD_ALLOWED_MODES: INLINE,PRESIGNED_SINGLE,DIRECT

secretRefs:
  - zhi-file-service-shared-secrets

probes:
  startup:
    path: /ready
    periodSeconds: 5
    failureThreshold: 20
  readiness:
    path: /ready
    periodSeconds: 10
    failureThreshold: 3
  liveness:
    path: /live
    periodSeconds: 10
    failureThreshold: 3

resources:
  requests:
    cpu: 500m
    memory: 512Mi
  limits:
    cpu: 2000m
    memory: 1Gi

pdb:
  enabled: true
  minAvailable: 1

hpa:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  cpuUtilization: 75
  memoryUtilization: 80

